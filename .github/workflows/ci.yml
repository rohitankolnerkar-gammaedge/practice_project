name: FastAPI CI/CD

on:
  push:
    branches:
      - master

jobs:
  test-and-build:

    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          PYTHONPATH=. pytest -v

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-alembic-app:latest \
          -t ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-alembic-app:${{ github.sha }} .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-alembic-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-alembic-app:${{ github.sha }}
